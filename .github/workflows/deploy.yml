name: Deploy Neuro-Sleep Tracker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Capture Terraform Outputs
        id: tf_outputs
        working-directory: infra
        run: |
          echo "bucket_name=$(terraform output -raw website_bucket_name)" >> $GITHUB_OUTPUT
          echo "api_base_url=$(terraform output -raw api_base_url)" >> $GITHUB_OUTPUT

      - name: Generate frontend config
        run: |
          cat <<EOF > frontend/config.js
          window.APP_CONFIG = {
            apiBaseUrl: "${{ steps.tf_outputs.outputs.api_base_url }}"
          };
          EOF

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.tf_outputs.outputs.bucket_name }} --deletes